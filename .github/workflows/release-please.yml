name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Dedicated PAT (or GitHub App token) so the commits/merges release-please
          # makes trigger `push` events. The default GITHUB_TOKEN deliberately does NOT
          # trigger further workflow runs, which is why the tag/GitHub release step never
          # fired after a release PR auto-merged. Falls back to GITHUB_TOKEN if the secret
          # is not configured (degrades to the old manual-tag behavior rather than failing).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: python

      - name: Report lint-pr-title check on Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_SHA=$(gh pr view --repo "$GITHUB_REPOSITORY" "${{ fromJSON(steps.release.outputs.pr).number }}" --json headRefOid -q .headRefOid)
          gh api repos/$GITHUB_REPOSITORY/check-runs \
            --method POST \
            -f name="lint-pr-title" \
            -f head_sha="$PR_SHA" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=PR title is valid" \
            -f "output[summary]=Release PR title follows Conventional Commits format"

      - name: Auto-merge Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          # Use the PAT here too: the squash-merge of the Release PR must be attributed to
          # the PAT so its `push` to main triggers this workflow again to cut the tag and
          # GitHub release. A merge performed with GITHUB_TOKEN would suppress that event.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "${{ fromJSON(steps.release.outputs.pr).number }}"
